version: "3.9"

services:

  soc:
    image: wazuh/wazuh:4.7.0
    ports:
      - "55000:55000"
    networks:
      - cyber_net

  siem:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
    networks:
      - cyber_net

  kibana:
    image: kibana:8.11.0
    ports:
      - "5601:5601"
    networks:
      - cyber_net

  ids:
    image: jasonish/suricata:latest
    cap_add:
      - NET_ADMIN
    networks:
      - cyber_net

  endpoint:
    image: ubuntu
    command: sleep infinity
    networks:
      - cyber_net

  attacker:
    image: kalilinux/kali-rolling
    command: sleep infinity
    networks:
      - cyber_net

networks:
  cyber_net:
